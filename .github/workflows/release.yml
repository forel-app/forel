name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runs_on: macos-14
            arch: arm64
            suffix: darwin-arm64
          - runs_on: macos-14
            arch: x86_64
            suffix: darwin-x86_64
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          xcode_app="$(ls -1d /Applications/Xcode*.app | sort -V | tail -n 1)"
          sudo xcode-select -switch "$xcode_app/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Build release binary
        run: swift build -c release --arch ${{ matrix.arch }}

      - name: Package app bundle
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          build_dir=".build/release"
          bundle_root="$RUNNER_TEMP/Forel.app"
          contents="$bundle_root/Contents"
          macos_dir="$contents/MacOS"
          resources_dir="$contents/Resources"
          resource_bundle="$(find "$build_dir" -maxdepth 1 -name "*.resources" -type d -print -quit)"

          rm -rf "$bundle_root"
          mkdir -p "$macos_dir" "$resources_dir"

          cp "$build_dir/ForelApp" "$macos_dir/ForelApp"
          chmod +x "$macos_dir/ForelApp"

          if [ -n "$resource_bundle" ]; then
            cp -R "$resource_bundle" "$resources_dir/"
          fi

          cat > "$contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>Forel</string>
            <key>CFBundleExecutable</key>
            <string>ForelApp</string>
            <key>CFBundleIdentifier</key>
            <string>com.forel.app</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Forel</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${version}</string>
            <key>CFBundleVersion</key>
            <string>${version}</string>
            <key>LSApplicationCategoryType</key>
            <string>public.app-category.productivity</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

          mkdir -p dist/release
          cp -R "$bundle_root" "dist/release/Forel.app"
          hdiutil create \
            -volname "Forel" \
            -srcfolder "dist/release/Forel.app" \
            -ov \
            -format UDZO \
            "dist/release/Forel-${GITHUB_REF_NAME}-${{ matrix.suffix }}.dmg"

      - name: Upload release artifact (${{ matrix.suffix }})
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: dist/release/Forel-${GITHUB_REF_NAME}-${{ matrix.suffix }}.dmg
          if-no-files-found: error

  publish:
    needs: build
    runs-on: macos-14
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*.dmg
          generate_release_notes: true
          prerelease: false
          body: |
            ## Forel ${{ github.ref_name }}

            Download the DMG that matches your Mac:
            - `Forel-${{ github.ref_name }}-darwin-arm64.dmg` for Apple Silicon
            - `Forel-${{ github.ref_name }}-darwin-x86_64.dmg` for Intel

            Requires **macOS 14 Sonoma or later**.

            1. Download the correct DMG.
            2. Open it and drag **Forel** into **Applications**.
            3. Launch the app from Applications or from the menu bar after installation.
